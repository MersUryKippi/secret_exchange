{% extends 'base.html' %}
{% block title %}Твой секрет{% endblock %}
{% block content %}
<h2>Получен секрет</h2>
<div style="background:#1a1a1a; padding:24px; border-radius:8px; font-size:1.1rem;">
    {{ received_text }}
</div>
<p style="margin-top:16px; color:#888;">У тебя есть 5 минут на прочтение. Потом он исчезнет.</p>
<form method="post" action="/exchange/burn/{{ exchange.id }}/">
    {% csrf_token %}
    <button type="submit" class="btn" style="background:#c0392b;">Сжечь</button>
</form>
{% endblock %}
