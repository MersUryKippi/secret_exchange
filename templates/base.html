<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Secret Exchange{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

  <header>
    <nav>
      <a href="/" class="nav-brand">
        <span class="nav-flame"></span>
        Secret Exchange
      </a>
      <div class="nav-links">
        <a href="/submit/">Поделиться</a>
        <a href="/exchange/">Получить</a>
        <a href="/my/">Мои секреты</a>
        <a href="/secrets/">Все уровни</a>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <span>Secret Exchange &mdash; анонимно &middot; честно &middot; без следов</span>
  </footer>

  <script src="{% static 'js/main.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
